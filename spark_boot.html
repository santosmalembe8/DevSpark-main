<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark_boot</title>
    <link rel="stylesheet" href="spark_boot.css">
</head>
<body>


<!-- ===== SÓ A INTERFACE DO CHAT ===== -->
<div id="chatbot-window">
  <div class="chat-header">
    <img src="imagem/icon/logo.png" alt="Bot">
    <span>SparkBoot</span>
  </div>

  <div class="chat-body" id="chat-body">
    <div class="msg bot">Olá, sou o SparkBoot, um chatboot criado pela DevSpark, que responde com base a perguntas armazenada em nossa, base de dados👋 Como posso te ajudar hoje?</div>
  </div>

  <div class="chat-footer">
    <div class="chat-input-wrap">
      <input type="text" id="chat-input" placeholder="Escreve a tua mensagem...">
      <button class="chat-send-btn" id="chat-send-btn" aria-label="Enviar">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>
</div>


    <script src="spark_boot.js"></script>
</body>
</html>
